volumes:
  dvwa:

networks:
  dvwa:

services:
  dvwa:
    build:
      context: ./dvwa-source
    container_name: dvwa-csrf-lab
    pull_policy: build
    environment:
      - DB_SERVER=db
    depends_on:
      - db
    networks:
      - dvwa
    ports:
      - "8081:80"
    restart: unless-stopped

  db:
    image: docker.io/library/mariadb:10
    container_name: dvwa-csrf-lab-db
    environment:
      - MYSQL_ROOT_PASSWORD=dvwa
      - MYSQL_DATABASE=dvwa
      - MYSQL_USER=dvwa
      - MYSQL_PASSWORD=p@ssw0rd
    volumes:
      - dvwa:/var/lib/mysql
    networks:
      - dvwa
    restart: unless-stopped
